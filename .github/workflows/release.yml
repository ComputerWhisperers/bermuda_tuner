name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Package integration
        run: zip -r bermuda_tuner.zip custom_components/bermuda_tuner
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: bermuda_tuner.zip
